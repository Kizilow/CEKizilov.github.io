<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Daily Notebook</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root {
    --bg: #f3f4f6;
    --bg-alt: #ffffff;
    --panel: #ffffff;
    --accent: #2563eb;
    --accent-soft: rgba(37,99,235,0.08);
    --text: #111827;
    --text-soft: #6b7280;
    --border: #d1d5db;
    --shadow-soft: 0 12px 30px rgba(15,23,42,0.12);
    --radius-lg: 18px;
    --radius-md: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; }

  /* Постоянный “paper”-фон */
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Georgia", "Times New Roman", serif;
    background: radial-gradient(circle at top, #e4ded0 0, #f5efe0 45%, #e4ded0 100%);
    color: var(--text);
    display: flex;
    justify-content: center;
  }

  .app-shell {
    display: flex;
    flex-direction: column;
    width: min(1200px, 100vw);
    margin: 12px;
    border-radius: 22px;
    background: var(--panel);
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #fef9c3, #ffffff);
  }

  .app-title-block { display: flex; align-items: center; gap: 10px; }
  .app-logo {
    width: 24px; height: 24px; border-radius: 9px;
    background: linear-gradient(135deg, #2563eb, #22c55e);
    box-shadow: 0 0 8px rgba(37,99,235,0.4);
  }
  .app-title-text { display: flex; flex-direction: column; }
  .app-title-text span:first-child {
    font-weight: 600; letter-spacing: 0.06em; font-size: 13px; text-transform: uppercase;
  }
  .app-title-text span:last-child { font-size: 11px; color: var(--text-soft); }

  .app-header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-soft);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.9);
  }

  .app-main {
    display: grid;
    grid-template-columns: 210px minmax(0, 1fr);
    align-items: stretch;
    height: calc(100vh - 80px);
    max-height: calc(100vh - 80px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    background: #f9fafb;
    padding: 8px 8px 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
  }

  .month-header { display: flex; flex-direction: column; gap: 4px; }
  .month-top-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .month-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-soft);
  }
  .month-name { font-size: 15px; font-weight: 600; color: var(--text); }

  .month-picker-wrapper { position: relative; display: inline-flex; align-items: center; }
  .btn-month {
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: #ffffff;
    color: var(--text);
    font-size: 11px;
    padding: 4px 9px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: background .15s, border-color .15s, transform .05s, box-shadow .15s;
  }
  .btn-month:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(37,99,235,0.3);
    background: #eff6ff;
  }
  .btn-month:active { transform: translateY(1px); }
  .btn-month span.icon { font-size: 13px; }

  .month-picker {
    position: absolute;
    right: 0;
    bottom: 0;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  .days-list {
    flex: 1;
    margin-top: 4px;
    border-radius: 12px;
    background: #f3f4f6;
    border: 1px solid var(--border);
    padding: 4px 2px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #9ca3af transparent;
  }
  .days-list::-webkit-scrollbar { width: 6px; }
  .days-list::-webkit-scrollbar-thumb {
    background: #9ca3af; border-radius: 999px;
  }

  .day-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    padding: 5px 8px;
    margin: 2px 4px;
    border-radius: 10px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-soft);
    transition: background .12s, color .12s, border .12s;
    border: 1px solid transparent;
  }
  .day-item span.day-number { font-weight: 500; }
  .day-item span.weekday {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
  }
  .day-item span.dot {
    width: 6px; height: 6px; border-radius: 50%; background: transparent;
  }
  .day-item.has-content span.dot {
    background: var(--accent); box-shadow: 0 0 6px rgba(37,99,235,0.8);
  }
  .day-item.flagged span.dot {
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,0.9);
  }
  .day-item.flagged {
    border-color: #22c55e;
    background: #ecfdf5;
  }
  .day-item:hover {
    background: #e5e7eb; color: var(--text); border-color: #cbd5f5;
  }
  .day-item.selected {
    background: #eff6ff; color: var(--text); border-color: var(--accent);
  }
  .day-item.today { border-style: solid; }

  .day-right {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .day-flag {
    cursor: pointer;
    width: 14px;
    height: 14px;
  }

  /* SEARCH RESULTS */
  .search-results {
    max-height: 120px;
    overflow-y: auto;
    font-size: 11px;
    margin-top: 2px;
    padding: 2px 0;
  }
  .search-result-item {
    padding: 2px 4px;
    border-radius: 6px;
    cursor: pointer;
  }
  .search-result-item:hover {
    background: #eff6ff;
  }
  .search-query-input {
    padding: 3px 6px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 11px;
    min-width: 120px;
  }

  /* EDITOR SIDE */
  .editor-panel {
    display: flex;
    flex-direction: column;
    background: #f9fafb;
    padding: 8px 10px 8px 8px;
    overflow: hidden;
  }

  .toolbar-row-main,
  .toolbar-row-secondary {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 4px;
  }

  .btn-main {
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #ffffff;
    color: var(--text);
    font-size: 11px;
    padding: 4px 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: background .15s, border-color .15s, transform .05s, box-shadow .15s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .btn-main:hover {
    border-color: var(--accent);
    background: #eff6ff;
    box-shadow: 0 0 0 1px rgba(37,99,235,0.3);
  }
  .btn-main:active { transform: translateY(1px); box-shadow: none; }
  .btn-main .icon { font-size: 13px; }

  .btn-small {
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #ffffff;
    font-size: 11px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    transition: background .15s, border-color .15s;
  }
  .btn-small:hover { background: #eff6ff; border-color: var(--accent); }
  .btn-small.bold { font-weight: 700; }

  .color-dot {
    width: 12px; height: 12px;
    border-radius: 999px; border: 1px solid #9ca3af;
  }
  .toolbar-spacer { flex: 1; }
  .today-label { font-size: 11px; color: var(--text-soft); }

  .editor-wrapper {
    flex: 1;
    margin-top: 4px;
    border-radius: var(--radius-lg);
    background: #fdf7e7;
    border: 1px solid #e5d5b5;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    font-size: 11px;
    background: #f3f4f6;
    border-bottom: 1px solid var(--border);
  }
  .editor-header-left { display: flex; align-items: baseline; gap: 8px; }
  .editor-date-main { font-weight: 600; font-size: 13px; }
  .editor-date-sub { font-size: 11px; color: var(--text-soft); }
  .editor-header-right { display: flex; align-items: center; gap: 6px; }

  .pill {
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #ffffff;
    font-size: 10px;
    color: var(--text-soft);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .pill span.dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 5px rgba(37,99,235,0.8);
  }

  .editor-area {
    flex: 1;
    padding: 6px 8px 8px;
    overflow-y: auto;
    position: relative;
    scrollbar-width: thin;
    scrollbar-color: #9ca3af transparent;
  }
  .editor-area::-webkit-scrollbar { width: 8px; }
  .editor-area::-webkit-scrollbar-thumb {
    background: #9ca3af; border-radius: 999px;
  }

  #editor {
    min-height: 100%;
    outline: none;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    caret-color: var(--accent);
  }
  #editor:empty:before {
    content: "Type text here or drop an image…";
    color: var(--text-soft);
    pointer-events: none;
  }
  #editor p { margin: 4px 0; }
  #editor h3 { margin: 8px 0 4px; }

  /* Враппер картинки с drag‑handle */
  .img-resize-wrapper {
    position: relative;
    display: block;
    margin: 8px 0;
  }

  .img-resize-wrapper img {
    display: block;
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    margin: 0 auto;
  }

  .img-resize-handle {
    position: absolute;
    width: 12px;
    height: 12px;
    background: #2563eb;
    border-radius: 2px;
    right: -6px;
    bottom: -6px;
    cursor: nwse-resize;
    box-shadow: 0 0 4px rgba(15,23,42,0.4);
    z-index: 5;
  }

  .drop-overlay {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    border: 2px dashed #93c5fd;
    background: rgba(219, 234, 254, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #1d4ed8;
    pointer-events: none;
  }
  .drop-overlay.show {
    display: flex;
  }

  @media (max-width: 800px) {
    .app-main {
      grid-template-columns: 1fr;
      height: auto;
      max-height: none;
    }
    .sidebar { order: 2; min-height: 160px; }
    .editor-panel { order: 1; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div class="app-title-block">
      <div class="app-logo"></div>
      <div class="app-title-text">
        <span>Daily Notebook</span>
        <span>Light journal with images</span>
      </div>
    </div>
    <div class="app-header-right">
      <div class="status-dot"></div>
      <span id="storage-status">Local storage: active</span>
    </div>
  </header>

  <main class="app-main">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="month-header">
        <div class="month-top-row">
          <div>
            <div class="month-label">MONTH</div>
            <div class="month-name" id="month-name"></div>
          </div>
          <div class="month-picker-wrapper">
            <button class="btn-month" id="btn-choose-month">
              <span class="icon">📅</span>
              <span>CHOOSE MONTH</span>
            </button>
            <input type="month" id="month-input" class="month-picker" />
          </div>
        </div>
      </div>
      <div class="days-list" id="days-list"></div>
    </aside>

    <!-- RIGHT EDITOR SIDE -->
    <section class="editor-panel">
      <div class="toolbar-row-main">
        <button class="btn-main" id="btn-new-day"><span class="icon">🆕</span>NEW DAY</button>
        <button class="btn-main" id="btn-today"><span class="icon">📍</span>TODAY</button>
        <button class="btn-main" id="btn-prev-day"><span class="icon">◀</span>PREVIOUS DAY</button>
        <button class="btn-main" id="btn-clear-day"><span class="icon">🗑️</span>CLEAR DAY</button>
        <button class="btn-main" id="btn-export-json"><span class="icon">⬇</span>EXPORT</button>
        <button class="btn-main" id="btn-import-json"><span class="icon">⬆</span>IMPORT</button>
        <div class="toolbar-spacer"></div>
        <div class="today-label" id="today-label"></div>
      </div>

      <div class="toolbar-row-secondary">
        <button class="btn-small bold" data-cmd="bold">B</button>
        <button class="btn-small" data-cmd="italic"><span style="font-style:italic;">I</span></button>
        <button class="btn-small" data-cmd="underline"><span style="text-decoration:underline;">U</span></button>
        <button class="btn-small" data-cmd="heading">H</button>
        <button class="btn-small" data-cmd="bullet">•</button>
        <button class="btn-small" data-cmd="quote">❝</button>

        <button class="btn-small" data-color="#111827">
          <span class="color-dot" style="background:#111827;border-color:#111827;"></span>
        </button>
        <button class="btn-small" data-color="#6b7280">
          <span class="color-dot" style="background:#6b7280;"></span>
        </button>
        <button class="btn-small" data-color="#b91c1c">
          <span class="color-dot" style="background:#b91c1c;border-color:#7f1d1d;"></span>
        </button>
        <button class="btn-small" data-color="#1d4ed8">
          <span class="color-dot" style="background:#1d4ed8;border-color:#1d4ed8;"></span>
        </button>

        <!-- выбор размера выделенного текста -->
        <select id="font-size-select" class="btn-small" style="padding:3px 6px;">
          <option value="">Size</option>
          <option value="2">Small</option>
          <option value="3">Normal</option>
          <option value="4">Large</option>
          <option value="5">XL</option>
        </select>

        <input id="search-input" class="search-query-input" type="search" placeholder="Search…" />
        <button class="btn-small" id="btn-search">Find</button>
      </div>

      <div id="search-results" class="search-results"></div>

      <div class="editor-wrapper">
        <div class="editor-header">
          <div class="editor-header-left">
            <span class="editor-date-main" id="current-date-main"></span>
            <span class="editor-date-sub" id="current-date-sub"></span>
          </div>
          <div class="editor-header-right">
            <div class="pill">
              <span class="dot"></span>
              <span id="auto-save-label">Autosave: on (local)</span>
            </div>
          </div>
        </div>
        <div class="editor-area" id="editor-area">
          <div id="editor" contenteditable="true"></div>
          <div class="drop-overlay" id="drop-overlay">
            <span>Drop image here</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- скрытый инпут для импорта JSON -->
  <input type="file" id="import-input" accept="application/json" style="display:none" />
</div>

<script>
(function() {
  const editor = document.getElementById('editor');
  const editorArea = document.getElementById('editor-area');
  const dropOverlay = document.getElementById('drop-overlay');

  const daysList = document.getElementById('days-list');
  const monthNameEl = document.getElementById('month-name');
  const monthInput = document.getElementById('month-input');
  const btnChooseMonth = document.getElementById('btn-choose-month');

  const btnNewDay = document.getElementById('btn-new-day');
  const btnToday = document.getElementById('btn-today');
  const btnPrevDay = document.getElementById('btn-prev-day');
  const btnClearDay = document.getElementById('btn-clear-day');

  const btnExportJson = document.getElementById('btn-export-json');
  const btnImportJson = document.getElementById('btn-import-json');
  const importInput = document.getElementById('import-input');

  const searchInput = document.getElementById('search-input');
  const btnSearch = document.getElementById('btn-search');
  const searchResultsEl = document.getElementById('search-results');

  const currentDateMain = document.getElementById('current-date-main');
  const currentDateSub = document.getElementById('current-date-sub');
  const todayLabel = document.getElementById('today-label');
  const storageStatus = document.getElementById('storage-status');

  const fontSizeSelect = document.getElementById('font-size-select');

  let currentDate = new Date();
  currentDate.setHours(0,0,0,0);

  const MONTH_NAMES_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const WEEKDAY_NAMES_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const FLAG_PREFIX = 'daily-notebook-flag:';

  function pad(n){ return n<10?'0'+n:String(n); }
  function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function storageKeyForDate(d){ return 'daily-notebook:'+dateKey(d); }
  function storageFlagKeyForDate(d){ return FLAG_PREFIX+dateKey(d); }
  function isToday(d){ const t=new Date(); t.setHours(0,0,0,0); return d.getTime()===t.getTime(); }
  function getDaysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }

  function setMonthHeader(d){
    const m=d.getMonth(), y=d.getFullYear();
    monthNameEl.textContent=MONTH_NAMES_SHORT[m]+' '+y;
    monthInput.value=y+'-'+pad(m+1);
  }

  function loadDayListForMonth(d){
    const y=d.getFullYear(), m=d.getMonth();
    daysList.innerHTML='';
    const days=getDaysInMonth(y,m);
    for(let day=1; day<=days; day++){
      const itemDate=new Date(y,m,day); itemDate.setHours(0,0,0,0);
      const key=storageKeyForDate(itemDate);
      const saved=localStorage.getItem(key);
      const hasContent=saved && saved!=='';      

      const flagKey = storageFlagKeyForDate(itemDate);
      const flagged = localStorage.getItem(flagKey) === '1';

      const div=document.createElement('div');
      div.className='day-item';
      if(hasContent) div.classList.add('has-content');
      if(isToday(itemDate)) div.classList.add('today');
      if(dateKey(itemDate)===dateKey(currentDate)) div.classList.add('selected');
      if(flagged) div.classList.add('flagged');

      const left=document.createElement('div');
      const num=document.createElement('span');
      num.className='day-number';
      num.textContent=pad(day);
      const wk=document.createElement('span');
      wk.className='weekday';
      wk.textContent=WEEKDAY_NAMES_SHORT[itemDate.getDay()];
      left.appendChild(num);
      left.appendChild(document.createTextNode(' '));
      left.appendChild(wk);

      const dot=document.createElement('span');
      dot.className='dot';

      const right = document.createElement('div');
      right.className = 'day-right';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'day-flag';
      checkbox.checked = flagged;

      checkbox.addEventListener('click', (e) => {
        e.stopPropagation();
        const checked = checkbox.checked;
        localStorage.setItem(flagKey, checked ? '1' : '0');
        if (checked) {
          div.classList.add('flagged');
        } else {
          div.classList.remove('flagged');
        }
      });

      right.appendChild(dot);
      right.appendChild(checkbox);

      div.appendChild(left);
      div.appendChild(right);

      div.addEventListener('click',()=>{
        currentDate=itemDate;
        updateCurrentDateHeader();
        loadContentForCurrentDate();
        refreshDaysSelection();
      });

      daysList.appendChild(div);
    }
  }

  function refreshDaysSelection(){
    const items=daysList.querySelectorAll('.day-item');
    const m=currentDate.getMonth(), y=currentDate.getFullYear();
    items.forEach((item,index)=>{
      const day=index+1;
      const itemDate=new Date(y,m,day); itemDate.setHours(0,0,0,0);
      item.classList.toggle('selected', dateKey(itemDate)===dateKey(currentDate));
      item.classList.toggle('today', isToday(itemDate));

      const key=storageKeyForDate(itemDate);
      const saved=localStorage.getItem(key);
      const hasContent=saved && saved!=='';
      item.classList.toggle('has-content', !!hasContent);

      const flagKey = storageFlagKeyForDate(itemDate);
      const flagged = localStorage.getItem(flagKey) === '1';
      item.classList.toggle('flagged', flagged);

      const checkbox = item.querySelector('.day-flag');
      if (checkbox) checkbox.checked = flagged;
    });
  }

  function updateCurrentDateHeader(){
    const d=currentDate;
    const day=d.getDate(), m=d.getMonth(), y=d.getFullYear();
    currentDateMain.textContent=pad(day)+' '+MONTH_NAMES_SHORT[m]+' '+y;
    currentDateSub.textContent=WEEKDAY_NAMES_SHORT[d.getDay()];
    const now=new Date();
    todayLabel.textContent='Today: '+WEEKDAY_NAMES_SHORT[now.getDay()]+' '+pad(now.getDate())+' '+MONTH_NAMES_SHORT[now.getMonth()];
  }

  function flashStatus(msg){
    const old=storageStatus.textContent;
    storageStatus.textContent=msg;
    setTimeout(()=>{ storageStatus.textContent=old; },1200);
  }

  function saveCurrent(){
    try{
      const key=storageKeyForDate(currentDate);
      const data=editor.innerHTML;
      localStorage.setItem(key,data);
      refreshDaysSelection();
      flashStatus('Saved');
    }catch(e){
      console.error(e);
      storageStatus.textContent='Local storage: error (see console)';
    }
  }

  function clearCurrentDay(){
    try {
      const key = storageKeyForDate(currentDate);
      localStorage.removeItem(key);
      editor.innerHTML = '';
      refreshDaysSelection();
      flashStatus('Day cleared');
    } catch(e) {
      console.error(e);
      storageStatus.textContent='Local storage: error (see console)';
    }
  }

  // ==== EXPORT / IMPORT JSON (все данные daily-notebook*) ====

  function exportJson() {
    try {
      const data = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k) continue;
        if (k.startsWith('daily-notebook')) {
          data[k] = localStorage.getItem(k);
        }
      }
      const jsonStr = JSON.stringify(data, null, 2);
      const blob = new Blob([jsonStr], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'daily-notebook-backup.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      flashStatus('JSON exported');
    } catch (e) {
      console.error(e);
      alert('Export error, see console');
    }
  }

  function importJsonFromFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const obj = JSON.parse(e.target.result);
        if (typeof obj !== 'object' || obj === null) throw new Error('Invalid JSON root');
        if (!confirm('Import JSON and replace current Daily Notebook data?')) {
          return;
        }
        const toRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith('daily-notebook')) {
            toRemove.push(k);
          }
        }
        toRemove.forEach(k => localStorage.removeItem(k));
        Object.keys(obj).forEach(k => {
          localStorage.setItem(k, obj[k]);
        });
        flashStatus('JSON imported');
        setMonthHeader(currentDate);
        loadDayListForMonth(currentDate);
        updateCurrentDateHeader();
        loadContentForCurrentDate();
      } catch(err) {
        console.error(err);
        alert('Invalid JSON file');
      }
    };
    reader.readAsText(file);
  }

  btnExportJson.addEventListener('click', exportJson);
  btnImportJson.addEventListener('click', () => {
    importInput.click();
  });

  importInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) importJsonFromFile(file);
    e.target.value = '';
  });

  // ==== SEARCH ACROSS ALL DAYS ====

  function stripHtml(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  function makeSnippet(text, query) {
    const lower = text.toLowerCase();
    const idx = lower.indexOf(query.toLowerCase());
    if (idx === -1) return text.slice(0, 80);
    const start = Math.max(0, idx - 30);
    const end = Math.min(text.length, idx + query.length + 30);
    let snip = text.slice(start, end);
    snip = snip.replace(/\s+/g, ' ').trim();
    if (start > 0) snip = '… ' + snip;
    if (end < text.length) snip = snip + ' …';
    return snip;
  }

  function performSearch() {
    const q = (searchInput.value || '').trim();
    searchResultsEl.innerHTML = '';
    if (!q) return;

    const results = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      if (!k.startsWith('daily-notebook:')) continue;
      const parts = k.split(':');
      if (parts.length !== 2) continue;
      const dateStr = parts[1];
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) continue;

      const html = localStorage.getItem(k) || '';
      const text = stripHtml(html);
      if (!text) continue;
      if (text.toLowerCase().includes(q.toLowerCase())) {
        results.push({
          key: k,
          dateStr,
          snippet: makeSnippet(text, q)
        });
      }
    }

    if (!results.length) {
      searchResultsEl.textContent = 'No results';
      return;
    }

    results.sort((a,b)=> a.dateStr.localeCompare(b.dateStr));
    results.forEach(r => {
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.textContent = r.dateStr + ' — ' + r.snippet;
      div.addEventListener('click', () => {
        const [y,m,d] = r.dateStr.split('-').map(Number);
        currentDate = new Date(y, m-1, d);
        currentDate.setHours(0,0,0,0);
        setMonthHeader(currentDate);
        loadDayListForMonth(currentDate);
        updateCurrentDateHeader();
        loadContentForCurrentDate();
        refreshDaysSelection();
        searchResultsEl.innerHTML = '';
      });
      searchResultsEl.appendChild(div);
    });
  }

  btnSearch.addEventListener('click', performSearch);
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      performSearch();
    }
  });

  // ==== IMAGE RESIZE WITH CORNER HANDLE ====

  function wrapImageWithHandle(img) {
    if (img.parentElement && img.parentElement.classList.contains('img-resize-wrapper')) return;

    const wrapper = document.createElement('div');
    wrapper.className = 'img-resize-wrapper';

    img.parentNode.insertBefore(wrapper, img);
    wrapper.appendChild(img);

    const handle = document.createElement('span');
    handle.className = 'img-resize-handle';
    wrapper.appendChild(handle);

    if (!wrapper.nextSibling || wrapper.nextSibling.nodeName.toLowerCase() !== 'p') {
      const p = document.createElement('p');
      p.innerHTML = '<br>';
      wrapper.parentNode.insertBefore(p, wrapper.nextSibling);
    }

    let startX, startWidth;

    handle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      startX = e.clientX;
      startWidth = img.getBoundingClientRect().width;

      function onMouseMove(ev) {
        const dx = ev.clientX - startX;
        const newWidth = Math.max(60, startWidth + dx);
        img.style.width = newWidth + 'px';
        img.style.height = 'auto';
      }

      function onMouseUp() {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        saveCurrent();
      }

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
  }

  function initImagesInEditor() {
    editor.querySelectorAll('img').forEach(img => wrapImageWithHandle(img));
  }

  function loadContentForCurrentDate(){
    const key=storageKeyForDate(currentDate);
    const data=localStorage.getItem(key);
    editor.innerHTML=data||'';
    initImagesInEditor();
  }

  function goToToday(){
    currentDate=new Date(); currentDate.setHours(0,0,0,0);
    setMonthHeader(currentDate);
    loadDayListForMonth(currentDate);
    updateCurrentDateHeader();
    loadContentForCurrentDate();
  }

  function goToPreviousDay(){
    const d=new Date(currentDate);
    const prevMonth=d.getMonth();
    d.setDate(d.getDate()-1); d.setHours(0,0,0,0);
    currentDate=d;
    updateCurrentDateHeader();
    loadContentForCurrentDate();
    if(currentDate.getMonth()!==prevMonth){
      setMonthHeader(currentDate);
      loadDayListForMonth(currentDate);
    }else{
      refreshDaysSelection();
    }
  }

  function newDay(){
    const d=new Date(currentDate);
    const prevMonth=d.getMonth();
    d.setDate(d.getDate()+1); d.setHours(0,0,0,0);
    currentDate=d;
    updateCurrentDateHeader();
    loadContentForCurrentDate();
    if(currentDate.getMonth()!==prevMonth){
      setMonthHeader(currentDate);
      loadDayListForMonth(currentDate);
    }else{
      refreshDaysSelection();
    }
  }

  // Buttons
  btnToday.addEventListener('click',()=>{ goToToday(); flashStatus('Today'); });
  btnPrevDay.addEventListener('click',()=>{ goToPreviousDay(); });
  btnNewDay.addEventListener('click',()=>{ newDay(); });
  btnClearDay.addEventListener('click', clearCurrentDay);

  // Month picker
  monthInput.addEventListener('change',()=>{
    const value=monthInput.value; if(!value) return;
    const [y,m]=value.split('-').map(Number);
    currentDate=new Date(y,m-1,1); currentDate.setHours(0,0,0,0);
    setMonthHeader(currentDate);
    loadDayListForMonth(currentDate);
    updateCurrentDateHeader();
    loadContentForCurrentDate();
  });

  btnChooseMonth.addEventListener('click',()=>{
    monthInput.focus();
    if ("showPicker" in HTMLInputElement.prototype &&
        typeof monthInput.showPicker === 'function') {
      try {
        monthInput.showPicker();
        return;
      } catch(e) {}
    }
    monthInput.click();
  });

  // Autosave
  let autosaveTimer=null;
  editor.addEventListener('input',()=>{
    if(autosaveTimer) clearTimeout(autosaveTimer);
    autosaveTimer=setTimeout(saveCurrent,800);
  });

  // ==== ВСТАВКА КАРТИНКИ В ТОЧКУ КУРСОРА ====

  function insertNodeAtCursor(node) {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) {
      editor.appendChild(node);
      return;
    }
    const range = sel.getRangeAt(0);
    range.deleteContents();
    range.insertNode(node);
    range.setStartAfter(node);
    range.setEndAfter(node);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function insertImageFile(file){
    if(!file.type.startsWith('image/')) return;
    const reader=new FileReader();
    reader.onload=function(ev){
      const img=document.createElement('img');
      img.src=ev.target.result;

      insertNodeAtCursor(img);
      wrapImageWithHandle(img);

      const wrapper = img.parentElement;
      const next = wrapper.nextSibling;
      if (next && next.nodeName.toLowerCase() === 'p') {
        const range = document.createRange();
        range.selectNodeContents(next);
        range.collapse(true);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }

      saveCurrent();
    };
    reader.readAsDataURL(file);
  }

  // Drag & drop images
  ['dragenter','dragover','dragleave','drop'].forEach(eventName=>{
    editorArea.addEventListener(eventName,e=>{
      e.preventDefault(); e.stopPropagation();
    });
  });
  ['dragenter','dragover'].forEach(eventName=>{
    editorArea.addEventListener(eventName,()=>dropOverlay.classList.add('show'));
  });
  ['dragleave','drop'].forEach(eventName=>{
    editorArea.addEventListener(eventName,()=>dropOverlay.classList.remove('show'));
  });

  editorArea.addEventListener('drop',e=>{
    const dt=e.dataTransfer; if(!dt) return;
    const files=dt.files; if(!files || !files.length) return;

    let range = null;
    if (document.caretRangeFromPoint) {
      range = document.caretRangeFromPoint(e.clientX, e.clientY);
    } else if (document.caretPositionFromPoint) {
      const pos = document.caretPositionFromPoint(e.clientX, e.clientY);
      range = document.createRange();
      range.setStart(pos.offsetNode, pos.offset);
      range.collapse(true);
    }

    if (range) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    insertImageFile(files[0]);
  });

  editor.addEventListener('paste',e=>{
    const items=e.clipboardData && e.clipboardData.items;
    if(!items) return;
    for(let i=0;i<items.length;i++){
      const it=items[i];
      if(it.kind==='file' && it.type.startsWith('image/')){
        const file=it.getAsFile();
        insertImageFile(file);
        e.preventDefault();
        break;
      }
    }
  });

  // Formatting
  function execCmd(cmd,value=null){
    editor.focus();
    if(cmd==='heading'){
      document.execCommand('formatBlock',false,'h3');
    }else if(cmd==='bullet'){
      document.execCommand('insertUnorderedList',false,null);
    }else if(cmd==='quote'){
      document.execCommand('formatBlock',false,'blockquote');
    }else if(cmd==='foreColor'){
      document.execCommand('foreColor',false,value);
    }else{
      document.execCommand(cmd,false,value);
    }
    saveCurrent();
  }

  document.querySelectorAll('.btn-small[data-cmd]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const cmd=btn.getAttribute('data-cmd');
      execCmd(cmd);
    });
  });

  document.querySelectorAll('.btn-small[data-color]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const color=btn.getAttribute('data-color');
      execCmd('foreColor',color);
    });
  });

  // выбор размера выделенного текста (fontSize 1–7 по HTML‑команде)[web:46]
  fontSizeSelect.addEventListener('change', () => {
    const val = fontSizeSelect.value;
    if (!val) return;
    editor.focus();
    document.execCommand('fontSize', false, val);
    fontSizeSelect.value = '';
    saveCurrent();
  });

  // Init
  try{
    if(!window.localStorage) storageStatus.textContent='Local storage not available';
  }catch(e){
    storageStatus.textContent='Local storage error';
  }

  goToToday();
  setMonthHeader(currentDate);
  loadDayListForMonth(currentDate);
  loadContentForCurrentDate();
})();
</script>
</body>
</html>
